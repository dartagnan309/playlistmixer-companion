name: release
on:
  push:
    tags: ['v*']
jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Derive version from tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Fetch static FFmpeg (win-x64)
        shell: pwsh
        run: ./companion/installer/fetch-ffmpeg-win.ps1
      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress
      - name: Build installer
        shell: pwsh
        run: ./companion/installer/build.ps1 -Version ${{ steps.ver.outputs.version }}
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            companion/installer/output/PlaylistMixer-Companion-Setup.exe
            companion/installer/output/companion-version.json
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Fetch static FFmpeg (macOS)
        shell: pwsh
        run: ./companion/installer/macos/fetch-ffmpeg.ps1
      - name: Build macOS artifacts
        run: sh ./companion/installer/macos/build-mac.sh ${{ steps.ver.outputs.version }}
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: |
            companion/installer/macos/output/companion-mac-arm64.tar.gz
            companion/installer/macos/output/companion-mac-x64.tar.gz
            companion/installer/macos/output/install.sh
            companion/installer/macos/output/uninstall.sh
  release:
    needs: [windows, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/windows/PlaylistMixer-Companion-Setup.exe
            dist/windows/companion-version.json
            dist/macos/companion-mac-arm64.tar.gz
            dist/macos/companion-mac-x64.tar.gz
            dist/macos/install.sh
            dist/macos/uninstall.sh
